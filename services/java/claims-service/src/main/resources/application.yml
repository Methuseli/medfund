server:
  port: 8083

spring:
  application:
    name: claims-service
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/medfund
    username: medfund
    password: medfund
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9080/realms/medfund-platform

springdoc:
  swagger-ui:
    path: /swagger-ui

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

kafka:
  bootstrap-servers: localhost:9092
