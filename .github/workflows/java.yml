name: Java Services CI

on:
  push:
    paths:
      - 'services/java/**'
      - '.github/workflows/java.yml'
  pull_request:
    paths:
      - 'services/java/**'

defaults:
  run:
    working-directory: services/java

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: medfund
          POSTGRES_PASSWORD: medfund
          POSTGRES_DB: medfund
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U medfund"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build -x test

      - name: Test
        run: ./gradlew test

      - name: Check
        run: ./gradlew check
