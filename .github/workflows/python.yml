name: Python AI Service CI

on:
  push:
    paths:
      - 'services/python/**'
      - '.github/workflows/python.yml'
  pull_request:
    paths:
      - 'services/python/**'

defaults:
  run:
    working-directory: services/python/ai-service

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest
