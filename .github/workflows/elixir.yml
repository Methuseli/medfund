name: Elixir Services CI

on:
  push:
    paths:
      - 'services/elixir/**'
      - '.github/workflows/elixir.yml'
  pull_request:
    paths:
      - 'services/elixir/**'

defaults:
  run:
    working-directory: services/elixir

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: medfund
          POSTGRES_PASSWORD: medfund
          POSTGRES_DB: medfund
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U medfund"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.17'
          otp-version: '27'

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Test
        run: mix test
        env:
          MIX_ENV: test
