<div class="feed-container">
  @if (title) {
    <div class="feed-header">
      <h3>{{ title }}</h3>
    </div>
  }
  <div class="feed-list">
    @for (item of items; track item.timestamp; let last = $last) {
      <div class="feed-item" [class.last]="last">
        <div class="feed-dot" [style.background]="item.iconColor">
          <app-icon [name]="item.icon" [size]="14"></app-icon>
        </div>
        <div class="feed-content">
          <div class="feed-title">
            {{ item.title }}
            @if (item.actor) {
              <span class="feed-actor">by {{ item.actor }}</span>
            }
          </div>
          <div class="feed-desc">{{ item.description }}</div>
          <div class="feed-time">{{ getRelativeTime(item.timestamp) }}</div>
        </div>
      </div>
    }
    @if (items.length === 0) {
      <div class="feed-empty">No recent activity</div>
    }
  </div>
</div>
