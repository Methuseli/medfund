<ngx-charts-line-chart
  [results]="data"
  [xAxis]="true"
  [yAxis]="true"
  [showXAxisLabel]="!!xAxisLabel"
  [showYAxisLabel]="!!yAxisLabel"
  [xAxisLabel]="xAxisLabel"
  [yAxisLabel]="yAxisLabel"
  [scheme]="colorScheme"
  [autoScale]="true"
  [roundDomains]="true"
  [gradient]="gradient"
  [legend]="legend"
  [legendTitle]="legendTitle"
  [animations]="true">
</ngx-charts-line-chart>
