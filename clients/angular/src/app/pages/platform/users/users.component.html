<div class="page-header">
  <div>
    <h1>User Management</h1>
    <p class="page-subtitle">Manage platform administrators and staff</p>
  </div>
  <button class="btn btn-primary">
    <app-icon name="plus" [size]="18"></app-icon>
    Invite User
  </button>
</div>

<div class="stats-grid">
  <app-stat-card
    label="Total Users"
    [value]="users.length"
    icon="users"
    color="blue"
  ></app-stat-card>
  <app-stat-card
    label="Active"
    [value]="activeUsers"
    icon="check-circle"
    color="green"
  ></app-stat-card>
  <app-stat-card
    label="Roles Defined"
    [value]="roles.length"
    icon="settings"
    color="cyan"
  ></app-stat-card>
</div>

<div class="sections">
  <app-data-table
    title="Platform Users"
    [columns]="userColumns"
    [data]="users"
    searchPlaceholder="Search users..."
  ></app-data-table>

  <app-data-table
    title="Roles & Permissions"
    [subtitle]="roles.length + ' roles'"
    [columns]="roleColumns"
    [data]="roles"
    [searchable]="false"
  ></app-data-table>
</div>
